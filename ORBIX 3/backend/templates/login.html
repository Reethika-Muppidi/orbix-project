<!DOCTYPE html>
<html>
<head>
    <title>ORBIX - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 30px 50px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
        }

        header .home-btn {
            position: absolute;
            left: 30px;
            background-color: #1e3c72;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        header .home-btn:hover {
            background-color: #2a5298;
        }

        /* Login Box */
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            margin: 60px auto;
        }

        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .login-box button {
            background: #1e3c72;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .login-box button:hover {
            background: #2a5298;
        }

        .login-box a {
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="{{ url_for('home') }}" class="home-btn">Home</a>
        <h1>ORBIX</h1>
    </header>

    <!-- Login Form -->
    <div class="login-box">
        <h2>Login Portal</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <br>
        <a href="{{ url_for('signup') }}">Create New Account</a>
    </div>

</body>
</html>
