<!DOCTYPE html>
<html>
<head>
    <title>ORBIX - Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #11998e, #38ef7d);
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 30px 50px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
        }

        header .home-btn {
            position: absolute;
            left: 30px;
            background-color: #11998e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        header .home-btn:hover {
            background-color: #0f7c6e;
        }

        /* Signup Box */
        .signup-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            margin: 60px auto;
        }

        .signup-box input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .signup-box button {
            width: 100%;
            padding: 10px;
            background: #11998e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .signup-box button:hover {
            background: #0f7c6e;
        }

        .signup-box a {
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="{{ url_for('home') }}" class="home-btn">Home</a>
        <h1>ORBIX</h1>
    </header>

    <!-- Signup Form -->
    <div class="signup-box">
        <h2>Create Account</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <br>
        <a href="{{ url_for('login') }}">Already have an account? Login</a>
    </div>

</body>
</html>
