<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>

    <!-- Add this for better font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* REMOVE DEFAULT SPACE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", "Segoe UI", Arial, sans-serif;
        }

        /* 🔵 NAVBAR (UPDATED) */
        .navbar {
            background-color: #355C9A; /* darker blue like 1st image */
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .navbar .logo {
            font-size: 22px;
            font-weight: 600; /* less bold */
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .navbar ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500; /* lighter than bold */
            transition: 0.3s;
        }

        .navbar ul li a:hover {
            opacity: 0.8;
        }

        /* 📩 PAGE TITLE */
        .hero {
            padding: 20px 40px;
        }

        /* 📩 NOTIFICATIONS */
        .notifications-container {
            padding: 20px 40px;
        }

        .notifications-container h2 {
            margin-bottom: 15px;
        }

        /* Rectangle message style */
        .notification-item {
            background: #f1f1f1;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 5px solid #355C9A; /* match navbar */
            border-radius: 5px;
            font-size: 16px;
        }
    </style>

</head>

<body>

<nav class="navbar">
    <div class="logo">ORBIX</div>
    <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('logout') }}">Logout</a></li>
    </ul>
</nav>

<div class="hero">
    <h1>Your Notifications 🔔</h1>
</div>

<div class="notifications-container">
    <h2>You have new notifications:</h2>

    {% for id in delivery_ids %}
    <div class="notification-item">
        You have delivered <b>{{ id }}</b> to customer
    </div>
    {% endfor %}

</div>

</body>
</html>
